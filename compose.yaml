version: '3.9'

services:
  blog-database:
    image: mongo
    ports:
      - '27018:27017'
  
  blog-backend:
    build: backend/
    environment:
      - PORT=3002
      - DATABASE_URL=mongodb://host.docker.internal:27018/blog
    ports:
      - '3002:3002'
    depends_on:
      - blog-database
  
  blog-frontend:
    build:
      context: .
      args:
        VITE_BACKEND_URL: http://localhost:3002/api/v1
    ports:
      - '3000:80'
    depends_on:
      - blog-backend